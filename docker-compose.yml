services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-football
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend-football:/app
      - ./storage:/app/storage
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  parser-worker:
    build:
      context: ./backend-football
    env_file:
      - ./.env
    depends_on:
      - backend
    volumes:
      - ./backend-football:/app
      - ./storage:/app/storage
    command: celery -A app.tasks.celery_app.celery_app worker -l info -Q parser

  scheduler:
    build:
      context: ./backend-football
    env_file:
      - ./.env
    depends_on:
      - backend
    volumes:
      - ./backend-football:/app
      - ./storage:/app/storage
    command: celery -A app.tasks.celery_app.celery_app beat -l info

  ai-worker:
    build:
      context: ./backend-football
    env_file:
      - ./.env
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend-football:/app
      - ./storage:/app/storage
    command: celery -A app.tasks.celery_app.celery_app worker -l info -Q ai

  publisher-worker:
    build:
      context: ./backend-football
    env_file:
      - ./.env
    depends_on:
      - backend
    volumes:
      - ./backend-football:/app
      - ./storage:/app/storage
    command: celery -A app.tasks.celery_app.celery_app worker -l info -Q publisher

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./app-football:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  postgres_data:
